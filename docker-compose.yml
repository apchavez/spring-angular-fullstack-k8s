services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-customerdb}
      POSTGRES_USER: ${DB_USER:-customer_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-customer_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-customer_user} -d ${DB_NAME:-customerdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-customerdb}
      DB_USER: ${DB_USER:-customer_user}
      DB_PASSWORD: ${DB_PASSWORD:-customer_pass}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
